<section id="signup-section" class="flex flex-col items-center justify-center min-h-screen bg-blue-50 gap gap-y-10">

  <div class="flex flex-col items-center text-center space-y-1">
    <h1 class="text-4xl font-semibold tracking-tight text-gray-900">
      Med<span class="text-blue-600">X</span>
    </h1>
    <p class="text-gray-500 font-light text-lg">
      Healthcare management, simplified.
    </p>
  </div>
  <div class="form-container bg-white p-4 pb-8 px-14 rounded-xl shadow-xl">
    <div class="form-header text-center mb-6">
      <h1 class="text-2xl font-semibold text-gray-900">Sign Up</h1>
      <p class="text-gray-500 mt-2 font-bold">
        Your health, all in one place—let’s begin.
      </p>
    </div>
    <div class="form-body w-full max-w-md mx-auto space-y-4">
      <!-- Name Row -->
      <div class="flex gap-3">
        <div class="w-1/2">
          <label class="block text-sm text-gray-600 mb-1">First Name</label>
          <input
            type="text"
            placeholder="John"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <div class="w-1/2">
          <label class="block text-sm text-gray-600 mb-1">Last Name</label>
          <input
            type="text"
            placeholder="Doe"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">Email</label>
        <input
          type="email"
          placeholder="you@example.com"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <!-- Phone -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">Phone Number</label>
        <input
          type="tel"
          placeholder="(123) 456-7890"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">Password</label>
        <input
          type="password"
          placeholder="••••••••"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">Confirm Password</label>
        <input
          type="password"
          placeholder="••••••••"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <!-- Button -->
      <button
        class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium hover:bg-blue-700 transition"
      >
        Sign Up
      </button>

    </div>

    </div>
</section>
